apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Point to the base
resources:
  - ../../base

# Separate namespace for prod
namespace: prod

# Prod-specific labels
labels:
  - pairs:
      environment: prod

commonAnnotations:
  team: "platform-eng"
  contact: "devops@example.com"

# Prod-specific patches
patches:
  # Scale up to 3 replicas for HA
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: web-app

  # Add resource limits (strategic merge patch via file)
  - path: resource-patch.yaml
    target:
      kind: Deployment
      name: web-app

  # Add HPA-ready annotations + rolling update strategy
  - path: strategy-patch.yaml
    target:
      kind: Deployment
      name: web-app

# Override ConfigMaps for prod
configMapGenerator:
  - name: web-app-config
    behavior: merge
    literals:
      - ENVIRONMENT=prod
      - LOG_LEVEL=warn

  - name: web-app-html
    behavior: replace
    literals:
      - index.html=<!DOCTYPE html><html><head><title>Kustomize Demo - PROD</title><style>body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#d4edda;}.card{background:white;padding:40px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.1);text-align:center;}h1{font-size:2rem;margin-bottom:10px;}.env-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-weight:bold;font-size:1.1rem;margin-top:10px;}</style></head><body><div class="card"><h1>🚀 Kustomize Demo App</h1><p>Environment:<strong>PRODUCTION</strong></p><span class="env-badge" style="background:#28a745;color:white;">prod</span><p style="margin-top:20px;color:#888;">3 replicas · warn logging · strict resource limits</p></div></body></html>
